<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFS セルフセッション</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #fdfaf7;
    --border: #e0d8d0;
    --text: #2c2520;
    --text-soft: #7a6e68;
    --accent: #8b6f5e;
    --accent-light: #c4a898;
    --user-bubble: #ede6df;
    --ai-bubble: #ffffff;
    --shadow: rgba(100, 80, 70, 0.08);
    --mic-active: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    width: 100%;
    max-width: 720px;
    padding: 28px 24px 12px;
    text-align: center;
  }

  .header-title {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .header-sub {
    font-size: 0.75rem;
    color: var(--text-soft);
    letter-spacing: 0.05em;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--accent-light);
    margin: 14px auto;
  }

  .chat-wrap {
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
  }

  .messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-bottom: 16px;
    max-height: calc(100vh - 300px);
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai { background: var(--accent); color: white; font-family: 'Noto Serif JP', serif; }
  .avatar.user { background: var(--user-bubble); color: var(--accent); border: 1px solid var(--border); }

  .bubble {
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .msg.ai .bubble {
    background: var(--ai-bubble);
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border-radius: 18px 4px 18px 18px;
  }

  /* Typing */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
    background: var(--ai-bubble);
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 12px var(--shadow);
    width: fit-content;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-light);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    width: 100%;
    max-width: 720px;
    padding: 12px 16px 16px;
    background: var(--bg);
    position: sticky;
    bottom: 0;
  }

  /* Voice status */
  .voice-status {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-soft);
    min-height: 20px;
    margin-bottom: 8px;
    transition: color 0.2s;
  }

  .voice-status.recording {
    color: var(--mic-active);
    animation: pulse-text 1s infinite;
  }

  @keyframes pulse-text {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .voice-status.speaking { color: var(--accent); }

  /* Input row */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 10px 10px 18px;
    box-shadow: 0 2px 16px var(--shadow);
    transition: box-shadow 0.2s;
  }

  .input-wrap:focus-within {
    box-shadow: 0 4px 24px rgba(139, 111, 94, 0.15);
    border-color: var(--accent-light);
  }

  textarea {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.6;
    max-height: 120px;
    min-height: 24px;
  }

  textarea::placeholder { color: var(--text-soft); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:hover { background: #7a5f4f; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  /* Mic button */
  .mic-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--accent-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    position: relative;
  }

  .mic-btn:hover { border-color: var(--accent); }

  .mic-btn.recording {
    background: var(--mic-active);
    border-color: var(--mic-active);
    animation: pulse-ring 1.5s infinite;
  }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.4); }
    70% { box-shadow: 0 0 0 12px rgba(192, 57, 43, 0); }
    100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
  }

  .mic-btn svg { width: 22px; height: 22px; transition: fill 0.2s; }
  .mic-btn:not(.recording) svg { fill: var(--accent); }
  .mic-btn.recording svg { fill: white; }

  /* Speaking wave */
  .speaking-wave {
    display: none;
    justify-content: center;
    align-items: center;
    gap: 3px;
    margin: 6px 0;
  }

  .speaking-wave.active { display: flex; }

  .wave-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 1s infinite ease-in-out;
  }

  .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 24px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 16px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 8px; animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); opacity: 0.6; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* Stop speaking button */
  .stop-btn {
    display: none;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-soft);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    margin: 0 auto 6px;
    transition: all 0.2s;
  }

  .stop-btn.active { display: block; }
  .stop-btn:hover { border-color: var(--accent-light); color: var(--accent); }

  .hint {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-soft);
    margin-top: 8px;
  }

  .reset-btn {
    position: fixed;
    top: 16px; right: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-soft);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.72rem;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--accent-light); color: var(--accent); }

  @media (max-width: 600px) {
    .header-title { font-size: 1.2rem; }
    .bubble { font-size: 0.88rem; }
    .messages { max-height: calc(100vh - 280px); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">IFS セルフセッション</div>
  <div class="header-sub">Internal Family Systems · 内なる対話のための場所</div>
  <div class="divider"></div>
</div>

<div class="chat-wrap">
  <div class="messages" id="messages"></div>
</div>

<div class="input-area">
  <div class="speaking-wave" id="speakingWave">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>
  <button class="stop-btn" id="stopBtn" onclick="stopSpeaking()">■ 読み上げを止める</button>

  <div class="voice-status" id="voiceStatus">マイクボタンで音声入力できます</div>

  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="テキストで入力するか、マイクで話しかけてください…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg viewBox="0 0 24 24" id="micIcon">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
  </div>
  <div class="hint">Enterで送信 · Shift+Enterで改行 · マイクボタンで音声入力ON/OFF</div>
</div>

<button class="reset-btn" onclick="resetSession()">リセット</button>

<script>
const SYSTEM_PROMPT = `あなたは、Internal Family Systems（IFS）の熟練したセラピスト兼ファシリテーターです。ゆうこ（Yuko Shimomura）のアプローチに基づいて、クライアントのセルフセッションをやさしくガイドします。

## あなたの在り方（Being）
- 常にセルフエネルギー（Self energy）から関わります：好奇心、思いやり、穏やかさ、開かれた心
- 急がず、押しつけず、クライアントのペースに合わせます
- 温かく、安心感のある言葉を使います
- 日本語で自然に、友達に語りかけるように話します
- 音声でも聞きやすいよう、文章は短めに、一度に一つの質問だけをします

## IFSの基本的な流れ
1. **パーツの特定** - 「今、どんなパーツ（感情や状態）があなたの注意を引いていますか？」
2. **懸念の確認** - そのパーツに取り組むことへの恐れや懸念がないか確認
3. **パーツを見つける** - 身体のどこにそのパーツを感じるか
4. **フォーカス** - そのパーツにやさしく注意を向ける
5. **パーツを知る** - 身体感覚、感情、イメージ、思考を探る
6. **ブレンド解除** - 「そのパーツに対して、どんな気持ちがしますか？」でセルフエネルギーを確認
   - 批判的・嫌悪・怖い → 別のパーツが出ているサイン
   - 好奇心・思いやり・温かさ → セルフエネルギーのサイン
7. **パーツと友達になる** - パーツの役割、心配、歴史を探る
8. **パーツへの感謝** - パーツの努力を認め、感謝を伝える

## 重要なガイドライン
- 複数のパーツが混在している場合、どのパーツと話したいか選んでもらう
- ブレンディング（パーツと一体化）を常に確認する
- セルフエネルギーがない場合は、まず別のパーツを扱う
- エグザイル（傷ついた部分）はプロテクターの許可を得てから、慎重に
- 感情が強くなりすぎたら「少しペースを落としましょう」と提案
- 回答は短く、温かく、一度に一つの質問のみ

このセッションはセルフコンパッションと内なる対話を深める安全な場です。`;

let conversationHistory = [];
let isLoading = false;
let recognition = null;
let isRecording = false;
let currentUtterance = null;
let isSpeaking = false;

// --- Speech Recognition ---
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.lang = 'ja-JP';
  rec.continuous = false;
  rec.interimResults = true;

  rec.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    setVoiceStatus('🎙 録音中… 話しかけてください', 'recording');
  };

  rec.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const textarea = document.getElementById('userInput');
    textarea.value = final || interim;
    autoResize(textarea);
  };

  rec.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    setVoiceStatus('マイクボタンで音声入力できます', '');
    const text = document.getElementById('userInput').value.trim();
    if (text) sendMessage();
  };

  rec.onerror = (e) => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    if (e.error === 'not-allowed') {
      setVoiceStatus('マイクの許可が必要です', '');
    } else {
      setVoiceStatus('音声認識エラー。もう一度お試しください', '');
    }
  };

  return rec;
}

function toggleMic() {
  if (isSpeaking) stopSpeaking();

  if (!recognition) {
    recognition = initRecognition();
    if (!recognition) {
      alert('このブラウザは音声認識に対応していません。\nChromeをお使いください。');
      return;
    }
  }

  if (isRecording) {
    recognition.stop();
  } else {
    recognition.start();
  }
}

// --- Text to Speech ---
function speak(text) {
  if (!window.speechSynthesis) return;
  stopSpeaking();

  // Clean text for speech (remove markdown-like symbols)
  const clean = text.replace(/[#*_`]/g, '').replace(/\n+/g, '。');

  currentUtterance = new SpeechSynthesisUtterance(clean);
  currentUtterance.lang = 'ja-JP';
  currentUtterance.rate = 0.9;
  currentUtterance.pitch = 1.05;

  // Prefer a Japanese voice
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));
  if (jaVoice) currentUtterance.voice = jaVoice;

  currentUtterance.onstart = () => {
    isSpeaking = true;
    document.getElementById('speakingWave').classList.add('active');
    document.getElementById('stopBtn').classList.add('active');
    setVoiceStatus('🔊 読み上げ中…', 'speaking');
  };

  currentUtterance.onend = () => {
    isSpeaking = false;
    document.getElementById('speakingWave').classList.remove('active');
    document.getElementById('stopBtn').classList.remove('active');
    setVoiceStatus('マイクボタンで音声入力できます', '');
  };

  currentUtterance.onerror = () => {
    isSpeaking = false;
    document.getElementById('speakingWave').classList.remove('active');
    document.getElementById('stopBtn').classList.remove('active');
  };

  window.speechSynthesis.speak(currentUtterance);
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  isSpeaking = false;
  document.getElementById('speakingWave').classList.remove('active');
  document.getElementById('stopBtn').classList.remove('active');
  setVoiceStatus('マイクボタンで音声入力できます', '');
}

// Ensure voices are loaded
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// --- UI Helpers ---
function setVoiceStatus(text, cls) {
  const el = document.getElementById('voiceStatus');
  el.textContent = text;
  el.className = 'voice-status' + (cls ? ' ' + cls : '');
}

function addMessage(role, content) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '心' : 'あ';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;

  div.appendChild(avatar);
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '心';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  div.appendChild(avatar);
  div.appendChild(typing);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// --- API Call ---
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  stopSpeaking();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();
  setVoiceStatus('考えています…', '');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'すみません、もう一度お試しください。';
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
    speak(reply);

  } catch (e) {
    removeTyping();
    const err = 'ネットワークエラーが発生しました。もう一度お試しください。';
    addMessage('ai', err);
    setVoiceStatus('マイクボタンで音声入力できます', '');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function resetSession() {
  if (!confirm('セッションをリセットしますか？')) return;
  stopSpeaking();
  conversationHistory = [];
  document.getElementById('messages').innerHTML = '';
  startSession();
}

// --- Start ---
async function startSession() {
  isLoading = true;
  showTyping();
  setVoiceStatus('準備中…', '');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: 'セッションを始めてください' }]
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'ようこそ。今日はどんなことを探ってみたいですか？';
    conversationHistory.push({ role: 'user', content: 'セッションを始めてください' });
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
    speak(reply);

  } catch (e) {
    removeTyping();
    const msg = 'ようこそ。今日はどんなことを探ってみたいですか？\nどんなパーツがあなたの注意を引いていますか？';
    addMessage('ai', msg);
    speak(msg);
  }

  isLoading = false;
  setVoiceStatus('マイクボタンで音声入力できます', '');
}

// Textarea events
const textarea = document.getElementById('userInput');
textarea.addEventListener('input', () => autoResize(textarea));
textarea.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

startSession();
</script>
</body>
</html>
